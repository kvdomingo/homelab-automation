apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-plugin
  namespace: argocd
data:
  avp.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: argocd-vault-plugin
    spec:
      allowConcurrency: true
      discover:
        find:
          command: [sh, -c]
          args:
            - find . -name '*.yaml' | xargs -I {} grep \"<path\\|avp\\.kubernetes\\.io\" {} | grep .
      generate:
        command: [sh, -c]
        args:
          - argocd-vault-plugin generate -s vault-configuration .
      lockRepo: false
  avp-helm.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: argocd-vault-plugin-helm
    spec:
      allowConcurrency: true
      discover:
        find:
          command: [sh, -c]
          args:
            - find . -name 'Chart.yaml' && find . -name 'values.yaml'
      init:
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            if [ -f Chart.yaml ]; then
              yq -r '.dependencies[].repository' Chart.yaml 2>/dev/null | grep '^https\?://' | sort -u | while read -r repo; do
                helm repo add "$(echo "$repo" | awk -F/ '{print $3}' | tr '.' '-')" "$repo" || true
              done
            fi
            helm dependency build
      generate:
        command: [bash, -c]
        args:
          - >
            helm template $ARGOCD_APP_NAME --include-crds -n $ARGOCD_APP_NAMESPACE -f <(echo "$ARGOCD_ENV_HELM_VALUES") . |
            argocd-vault-plugin generate -s vault-configuration -
      lockRepo: false
