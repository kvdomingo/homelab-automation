{{- if not .Values.disableSecretsStoreCsi }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical-csi-provider
  namespace: {{ include "apps.argocdNamespace" . | quote }}
  finalizers:
    {{- include "apps.finalizers" . | nindent 4 }}
spec:
  project: {{ .Values.project }}
  source:
    repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
    chart: infisical-csi-provider
    targetRevision: 0.2.1
    helm:
      releaseName: infisical-csi-provider
      valuesObject:
        image:
          tag: v0.0.7
  destination:
    server: {{ .Values.destination.server }}
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
{{- end }}
