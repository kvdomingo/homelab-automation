{{- if not .Values.disableFirefly }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: firefly
  namespace: {{ include "apps.argocdNamespace" . | quote }}
  finalizers:
    {{ include "apps.finalizers" . | nindent 4 }}
spec:
  project: {{ .Values.project }}
  sources:
    - repoURL: https://github.com/kvdomingo/homelab-automation.git
      targetRevision: main
      path: firefly
    - repoURL: https://firefly-iii.github.io/kubernetes/
      chart: firefly-iii
      targetRevision: 1.9.3
      helm:
        releaseName: firefly
        valuesObject:
          replicaCount: 1
          deploymentStrategyType: RollingUpdate
          image:
            registry: "docker.io"
            repository: "fireflyiii/core"
            pullPolicy: IfNotPresent
            tag: "version-6"

          persistence:
            # -- If you set this to false, uploaded attachments are not stored persistently and will be lost with every restart of the pod
            enabled: true
            accessModes: ReadWriteOnce
            storage: 1Gi
            # -- If you want to use an existing claim, set it here
            existingClaim: ""
            annotations:
              argocd.argoproj.io/sync-options: Delete=false,Prune=false

          # -- Environment variables for Firefly III. See docs at: https://github.com/firefly-iii/firefly-iii/blob/main/.env.example
          config:
            # -- Set this to the name of a secret to load environment variables from. If defined, values in the secret will override values in config.env
            existingSecret: firefly-secrets

            # -- Set environment variables from configMaps or Secrets
            envValueFrom: { }

            # -- Directly defined environment variables. Use this for non-secret configuration values.
            env:
              DB_CONNECTION: "pgsql"
              DB_HOST: '10.10.10.103'
              DB_PORT: "5432"
              DB_USERNAME: "firefly"
              DB_DATABASE: "firefly"
              APP_ENV: "production"
              TZ: "Asia/Manila"
              TRUSTED_PROXIES: "**"
              MAP_DEFAULT_LAT: "14.60"
              MAP_DEFAULT_LONG: "120.97"
              APP_URL: "https://firefly.lab.kvd.studio/"
              CACHE_DRIVER: redis
              SESSION_DRIVER: redis
              REDIS_HOST: "redis-headless"
              REDIS_PORT: 6379
              ENABLE_EXCHANGE_RATES: true
              ENABLE_EXTERNAL_RATES: true

          # -- Create a new Secret from values file to store sensitive environment variables. Make sure to keep your secrets encrypted in the repository! For example, you can use the 'helm secrets' plugin (https://github.com/jkroepke/helm-secrets) to encrypt and manage secrets. If the 'config.existingSecret' value is set, a new Secret will not be created.
          secrets:
            env: { }
            # -- Statically set the APP_KEY in case this is desired over the autogeneration. Should be a random 32-character string.
            # -- Can be generated using: `cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 32 | head -n 1`
            # appKey: "CHANGE_ME"

          # -- A cronjob for [recurring Firefly III tasks](https://docs.firefly-iii.org/firefly-iii/advanced-installation/cron/).
          cronjob:
            # -- Set to true to enable the CronJob. Note that you need to specify either cronjob.auth.existingSecret or cronjob.auth.token for it to actually be deployed.
            enabled: true

            # -- Authorization for the CronJob. See https://docs.firefly-iii.org/firefly-iii/advanced-installation/cron/#request-a-page-over-the-web
            auth:
              # -- The name of a secret containing a data.token field with the cronjob token
              existingSecret: firefly-secrets

              # -- The name of the key in the existing secret to get the cronjob token from
              secretKey: STATIC_CRON_TOKEN

              # -- The token in plain text
              token: ""

            # -- Annotations for the CronJob
            annotations: { }

            # -- When to run the CronJob. Defaults to 03:00 as this is when Firefly III executes regular tasks.
            schedule: "0 16 * * *"

            # -- How many pods to keep around for successful jobs
            successfulJobsHistoryLimit: 3

            # -- How many pods to keep around for failed jobs
            failedJobsHistoryLimit: 1

            # -- How to treat failed jobs
            restartPolicy: OnFailure

            image:
              registry: docker.io
              repository: curlimages/curl
              pullPolicy: IfNotPresent
              tag: 8.12.0

            imagePullSecrets: [ ]

            podAnnotations: { }

            securityContext: { }

            podSecurityContext: { }

            resources: { }

            nodeSelector: { }

            tolerations: [ ]

            affinity: { }

          podAnnotations: { }

          podSecurityContext: { }
          # fsGroup: 2000

          securityContext: { }
          # capabilities:
          #   drop:
          #   - ALL
          # readOnlyRootFilesystem: true
          # runAsNonRoot: true
          # runAsUser: 1000

          service:
            type: ClusterIP
            port: 80

          ingress:
            enabled: true
            className: ""
            annotations:
              gethomepage.dev/enabled: "true"
              gethomepage.dev/name: "Firefly"
              gethomepage.dev/group: "Finances"
              gethomepage.dev/icon: "firefly.png"
              gethomepage.dev/ping: "https://firefly.lab.kvd.studio/health"
            hosts:
              - firefly.lab.kvd.studio
              - firefly.kvd.studio
            tls: [ ]
            #  - secretName: chart-example-tls
            #    hosts:
            #      - chart-example.local

          resources:
            # We usually recommend not to specify default resources and to leave this as a conscious
            # choice for the user. This also increases chances charts run on environments with little
            # resources, such as Minikube. If you do want to specify resources, uncomment the following
            # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi

          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 5
            targetCPUUtilizationPercentage: 80
            # targetMemoryUtilizationPercentage: 80

          nodeSelector: { }

          tolerations: [ ]

          affinity: { }

          # Here, you can specify custom volumes to use.
          extraVolumes: [ ]
          # - name: db-tls-firefly
          #   secret:
          #     secretName: db-tls-firefly
          #     defaultMode: 0440

          # And here, your custom volume mounts.
          extraVolumeMounts: [ ]
          # - name: db-tls-firefly
          #   mountPath: /db-cert
          #   readOnly: true

          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            timeoutSeconds: 1
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 10
    - repoURL: https://charts.bitnami.com/bitnami
      chart: redis
      targetRevision: 21.1.6
      helm:
        releaseName: redis
        valuesObject:
          global:
            security:
              allowInsecureImages: true
          image:
            repository: bitnamilegacy/redis
            tag: 7.4.3-debian-12-r0
          architecture: standalone
          master:
            persistence:
              enabled: true
              annotations:
                argocd.argoproj.io/sync-options: Delete=false,Prune=false
          volumePermissions:
            enabled: true
            image:
              repository: bitnamilegacy/os-shell
              tag: 12-debian-12-r45
          auth:
            enabled: true
            existingSecret: firefly-secrets
            existingSecretPasswordKey: REDIS_PASSWORD
          sysctl:
            image:
              repository: bitnamilegacy/os-shell
              tag: 12-debian-12-r45
    - repoURL: https://firefly-iii.github.io/kubernetes/
      chart: importer
      targetRevision: 1.4.1
      helm:
        releaseName: importer
        valuesObject:
          image:
            tag: version-1.6.1
          trustedProxies: "**"
          fireflyiii:
            url: http://firefly-firefly-iii
            vanityUrl: https://firefly.lab.kvd.studio
            auth:
              existingSecret: firefly-importer-secrets
          config:
            env:
              IGNORE_DUPLICATE_ERRORS: true
              TZ: Asia/Manila
          ingress:
            enabled: true
            className: traefik
            annotations:
              gethomepage.dev/enabled: "true"
              gethomepage.dev/name: "Firefly Importer"
              gethomepage.dev/group: "Finances"
              gethomepage.dev/icon: "firefly.png"
              gethomepage.dev/ping: "https://firefly-importer.lab.kvd.studio/health"
            hosts:
              - firefly-importer.lab.kvd.studio
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 100m
                memory: 128Mi
  destination:
    server: {{ .Values.destination.server }}
    namespace: firefly
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
{{- end }}
