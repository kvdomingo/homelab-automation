{{- if not .Values.disableLakeFs }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lakefs
  namespace: {{ include "apps.argocdNamespace" . | quote }}
  finalizers:
    {{- include "apps.finalizers" . | nindent 4 }}
spec:
  project: {{ .Values.project }}
  sources:
    - repoURL: https://github.com/kvdomingo/homelab-automation.git
      targetRevision: main
      path: infisical-secrets/lakefs
    - repoURL: https://charts.lakefs.io
      chart: lakefs
      targetRevision: 1.7.18
      helm:
        releaseName: lakefs
        valuesObject:
          ingress:
            enabled: true
            annotations:
              gethomepage.dev/enabled: "true"
              gethomepage.dev/name: "LakeFS"
              gethomepage.dev/group: "Storage"
              gethomepage.dev/icon: "lakefs.png"
              gethomepage.dev/ping: "https://lakefs.lab.kvd.studio"
            hosts:
              - host: lakefs.lab.kvd.studio
                paths: [ / ]
          lakefsConfig: |
            database:
              type: postgres
              postgres:
                max_open_connections: 10
                max_idle_connections: 10
            blockstore:
              type: s3
              default_namespace_prefix: "s3://lakefs/"
              s3:
                force_path_style: true
                endpoint: https://api-minio.lab.kvd.studio
            stats:
              enabled: false
            usage_report:
              enabled: false
          existingSecret: lakefs-secrets
          secretKeys:
            authEncryptSecretKey: AUTH_ENCRYPT_SECRET_KEY
            databaseConnectionString: DATABASE_URL
  destination:
    server: {{ .Values.destination.server }}
    namespace: lakefs
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
{{- end }}
