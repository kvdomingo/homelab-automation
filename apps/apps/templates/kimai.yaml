{{- if not .Values.disableKimai }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kimai
  namespace: {{ include "apps.argocdNamespace" . | quote }}
  finalizers:
    {{- include "apps.finalizers" . | nindent 4 }}
spec:
  project: {{ .Values.project }}
  sources:
    - repoURL: https://github.com/kvdomingo/homelab-automation.git
      targetRevision: main
      path: infisical-secrets/kimai
    - repoURL: https://robjuz.github.io/helm-charts/
      chart: kimai2
      targetRevision: 5.0.4
      helm:
        releaseName: kimai
        valuesObject:
          image:
            tag: apache-2.48.0
          kimaiAdminEmail: "hello@kvd.studio"
          kimaiMailerFrom: "hello@kvd.studio"
          existingSecret: kimai-secrets
          podSecurityContext:
            enabled: true
          containerSecurityContext:
            enabled: true
          livenessProbe:
            enabled: true
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            enabled: false
          startupProbe:
            enabled: true
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
            successThreshold: 1
          service:
            type: ClusterIP
          ingress:
            enabled: true
            pathType: Prefix
            hostname: kimai.lab.kvd.studio
            annotations:
              gethomepage.dev/enabled: "true"
              gethomepage.dev/name: "Kimai"
              gethomepage.dev/group: "Admin"
              gethomepage.dev/icon: "kimai.png"
              gethomepage.dev/ping: "https://kimai.lab.kvd.studio"
          persistence:
            enabled: true
            annotations:
              helm.sh/resource-policy: keep
              argocd.argoproj.io/sync-options: Delete=false,Prune=false
          volumePermissions:
            enabled: true
          serviceAccount:
            create: true
          pdb:
            create: true
            minAvailable: 1
          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 5
            targetCPU: 80
            targetMemory: 80
          mariadb:
            enabled: true
            auth:
              username: kimai
              database: kimai
              existingSecret: kimai-secrets
  destination:
    server: {{ .Values.destination.server }}
    namespace: kimai
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
{{- end }}
