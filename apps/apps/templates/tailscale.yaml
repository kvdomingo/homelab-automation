{{- if not .Values.disableTailscale }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale
  namespace: {{ include "apps.argocdNamespace" . | quote }}
  finalizers:
    {{- include "apps.finalizers" . | nindent 4 }}
spec:
  project: {{ .Values.project }}
  sources:
    - repoURL: https://github.com/kvdomingo/homelab-automation.git
      targetRevision: main
      path: infisical-secrets/tailscale
    - repoURL: https://pkgs.tailscale.com/helmcharts
      chart: tailscale-operator
      targetRevision: 1.94.2
      helm:
        releaseName: tailscale
        valuesObject:
          installCRDs: true
          operatorConfig:
            defaultTags:
              - "tag:k8s-operator"
            image:
              repository: tailscale/k8s-operator
              tag: stable
              pullPolicy: Always
          apiServerProxyConfig:
            mode: "true"
          proxyConfig:
            image:
              repository: tailscale/tailscale
              tag: stable
            defaultTags: "tag:k8s"
  destination:
    server: {{ .Values.destination.server }}
    namespace: tailscale
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
{{- end }}
