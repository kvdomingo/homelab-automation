{{- if not .Values.disableVaultwarden }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: {{ include "apps.argocdNamespace" . | quote }}
  finalizers:
    {{- include "apps.finalizers" . | nindent 4 }}
spec:
  project: {{ .Values.project }}
  sources:
    - repoURL: https://github.com/kvdomingo/homelab-automation.git
      targetRevision: main
      path: infisical-secrets/vaultwarden
    - repoURL: https://guerzon.github.io/vaultwarden
      chart: vaultwarden
      targetRevision: 0.35.1
      helm:
        releaseName: vaultwarden
        valuesObject:
          image:
            tag: latest-alpine
            pullPolicy: Always
          replicas: 3
          commonAnnotations:
            keel.sh/policy: "force"
            keel.sh/match-tag: "true"
            keel.sh/trigger: "poll"
            keel.sh/pollSchedule: "@every 5m"
            secrets.infisical.com/auto-reload: "true"
          readinessProbe:
            enabled: false
          startupProbe:
            enabled: true
            failureThreshold: 60
            timeoutSeconds: 3
            initialDelaySeconds: 10
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          webVaultEnabled: true
          storage:
            data:
              name: "vaultwarden-data"
              size: "15Gi"
              class: nfs-client
              path: "/data"
              keepPvc: true
              accessMode: "ReadWriteOnce"
            attachments:
              name: "vaultwarden-files"
              size: "100Gi"
              class: nfs-client
              path: /files
              keepPvc: true
              accessMode: "ReadWriteOnce"
          database:
            type: postgresql
            host: "10.10.10.103"
            port: "5432"
            existingSecret: vaultwarden-secrets
            existingSecretUserKey: POSTGRESQL_USERNAME
            existingSecretPasswordKey: POSTGRESQL_PASSWORD
            dbName: vaultwarden
            maxConnections: 3
          pushNotifications:
            enabled: true
            existingSecret: vaultwarden-secrets
            installationId:
              existingSecretKey: INSTALLATION_ID
            installationKey:
              existingSecretKey: INSTALLATION_KEY
            relayUri: "https://api.bitwarden.eu"
            identityUri: "https://identity.bitwarden.eu"
          domain: "https://vaultwarden.{{ .Values.ingress.baseDomain }}"
          sendsAllowed: true
          trashAutoDeleteDays: 30
          signupsAllowed: false
          orgEventsEnabled: true
          invitationsAllowed: true
          adminToken:
            existingSecret: vaultwarden-secrets
            existingSecretKey: ADMIN_TOKEN
          timeZone: Asia/Manila
          orgGroupsEnabled: true
          smtp:
            host: "smtp.gmail.com"
            port: 587
            security: starttls
            from: vaultwarden@kvd.studio
            fromName: Vaultwarden
            existingSecret: vaultwarden-secrets
            username:
              existingSecretKey: SMTP_USERNAME
            password:
              existingSecretKey: SMTP_PASSWORD
          ingress:
            enabled: true
            class: traefik
            hostname: vaultwarden.lab.kvd.studio
            additionalAnnotations:
              gethomepage.dev/enabled: "true"
              gethomepage.dev/name: "Vaultwarden"
              gethomepage.dev/group: "Security"
              gethomepage.dev/icon: "bitwarden.png"
              gethomepage.dev/ping: "https://vaultwarden.{{ .Values.ingress.baseDomain }}"
  destination:
    server: {{ .Values.destination.server }}
    namespace: vaultwarden
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
{{- end }}
