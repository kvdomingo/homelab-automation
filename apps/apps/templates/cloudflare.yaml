{{- if not .Values.disableCloudflareTunnel }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare
  namespace: {{ include "apps.argocdNamespace" . | quote }}
  finalizers:
    {{- include "apps.finalizers" . | nindent 4 }}
spec:
  project: {{ .Values.project }}
  sources:
    - repoURL: https://github.com/kvdomingo/homelab-automation.git
      targetRevision: main
      path: cloudflare
    - repoURL: https://cloudflare.github.io/helm-charts
      chart: cloudflare-tunnel
      targetRevision: 0.3.2
      helm:
        releaseName: cloudflare
        valuesObject:
          cloudflare:
            secretName: cloudflare-secrets
            enableWarp: true
          image:
            pullPolicy: Always
            tag: latest
  destination:
    server: {{ .Values.destination.server }}
    namespace: cloudflare
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
{{- end }}
