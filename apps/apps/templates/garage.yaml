{{- if not .Values.disableGarage }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage
  namespace: {{ include "apps.argocdNamespace" . | quote }}
  finalizers:
    {{- include "apps.finalizers" . | nindent 4 }}
spec:
  project: {{ .Values.project }}
  sources:
    - repoURL: https://github.com/deuxfleurs-org/garage
      targetRevision: main-v2
      path: script/helm/garage
      plugin:
        name: argocd-vault-plugin-helm
        env:
          - name: HELM_VALUES
            value: |
              garage:
                rpcSecret: "<path:kv/data/lab/garage#RPC_SECRET>"
                s3:
                  api:
                    region: ap-southeast-1
                    rootDomain: garage-api.lab.kvd.studio
                  web:
                    rootDomain: garage.lab.kvd.studio
              persistence:
                enabled: true
                meta:
                  size: 100Mi
                data:
                  size: 100Mi
              deployment:
                replicaCount: 4
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                      - matchExpressions:
                          - key: kubernetes.io/arch
                            operator: NotIn
                            values: [ arm64, arm ]
              ingress:
                s3:
                  api:
                    enabled: true
                    annotations:
                      gethomepage.dev/enabled: "true"
                      gethomepage.dev/name: "Garage API"
                      gethomepage.dev/group: "Storage"
                      gethomepage.dev/icon: "garage.png"
                      gethomepage.dev/ping: "https://garage-api.{{ .Values.ingress.baseDomain }}"
                    hosts:
                      - host: "garage-api.{{ .Values.ingress.baseDomain }}"
                        paths:
                          - path: /
                            pathType: Prefix
                  web:
                    enabled: true
                    annotations:
                      gethomepage.dev/enabled: "true"
                      gethomepage.dev/name: "Garage"
                      gethomepage.dev/group: "Storage"
                      gethomepage.dev/icon: "garage.png"
                      gethomepage.dev/ping: "https://garage.{{ .Values.ingress.baseDomain }}"
                    hosts:
                      - host: "garage.{{ .Values.ingress.baseDomain }}"
                        paths:
                          - path: /
                            pathType: Prefix
              monitoring:
                metrics:
                  enabled: true
                  serviceMonitor:
                    enabled: true
  destination:
    server: {{ .Values.destination.server }}
    namespace: garage
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
{{- end }}
