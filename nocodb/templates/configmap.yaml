apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nocodb.fullname" . }}-configmap
  labels:
    {{- include "nocodb.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  NC_S3_ENDPOINT: "https://minio-api.lab.kvd.studio"
  NC_S3_FORCE_PATH_STYLE: "true"
  PORT: "{{ .Values.service.port }}"
  NC_SITE_URL: "https://{{ (index .Values.ingress.hosts 0).host }}"
  NC_CACHE_REDIS_URL: "redis://{{ include "nocodb.fullname" . }}-redis-headless:6379/0"
  NC_DISABLE_TELE: "true"
