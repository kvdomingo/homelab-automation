apiVersion: v1
kind: Secret
metadata:
  name: '{{ include "atuin.fullname" . }}-secrets'
  labels:
    {{ include "atuin.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
    avp.kubernetes.io/path: kv/data/lab/atuin
type: Opaque
stringData:
  ATUIN_DB_URI: "<ATUIN_DB_URI>"
  ATUIN_DB_PASSWORD: "<ATUIN_DB_PASSWORD>"
