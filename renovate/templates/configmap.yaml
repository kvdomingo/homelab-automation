apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{ include "renovate.fullname" . }}-configmap'
  labels:
    {{- include "renovate.labels" . | nindent 4 }}
data:
  config.json5: |-
    {
      "globalExtends": [
        "config:recommended",
        ":semanticCommits",
      ],
      "onboarding": true,
      "repositories": [
        "kvdomingo/banyuhay",
        "kvdomingo/hannibot",
      ],
      "separateMinorPatch": true,
      "packageRules": [
        {
          "matchDatasources": ["python-version"],
          "matchUpdateTypes": ["major", "minor"],
          "enabled": false,
        },
        {
          "matchManagers": ["terraform"],
          "matchDepTypes": ["provider"],
          "matchUpdateTypes": ["major"],
          "enabled": false,
        },
      ]
    }
