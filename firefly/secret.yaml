apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: firefly-inf-secret
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  syncConfig:
    resyncInterval: 10s
  authentication:
    kubernetesAuth:
      identityId: ea9c7e43-4921-4cac-bac7-8fc8b1a24440
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: infisical-service-account
        namespace: infisical2
      secretsScope:
        projectSlug: firefly
        envSlug: prod
        secretsPath: /
        recursive: true
  managedKubeSecretReferences:
    - secretName: firefly-secrets
      secretNamespace: firefly
      creationPolicy: Owner
      template:
        includeAllSecrets: true
        metadata:
          annotations:
            helm.sh/hook: pre-install
            helm.sh/hook-weight: "-5"
            helm.sh/hook-delete-policy: before-hook-creation
    - secretName: firefly-importer-secrets
      secretNamespace: firefly
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        metadata:
          annotations:
            helm.sh/hook: pre-install
            helm.sh/hook-weight: "-5"
            helm.sh/hook-delete-policy: before-hook-creation
        data:
          accessToken: "{{ .ACCESS_TOKEN.Value }}"
