# Default values for ihatemoney.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ihatemoney/ihatemoney
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest

deploymentAnnotations:
  keel.sh/policy: "force"
  keel.sh/match-tag: "true"
  keel.sh/trigger: "poll"
  keel.sh/pollSchedule: "@every 5m"
  secrets.infisical.com/auto-reload: "true"

imagePullSecrets: [ ]
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: { }
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: { }
podLabels: { }

podSecurityContext: { }
# fsGroup: 2000

securityContext: { }
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: ""
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "ihatemoney"
    gethomepage.dev/group: "Finances"
    gethomepage.dev/icon: "ihatemoney.png"
    gethomepage.dev/ping: "https://ihatemoney.lab.kvd.studio"
  hosts:
    - host: ihatemoney.lab.kvd.studio
      paths:
        - path: /
          pathType: Prefix
  tls: [ ]

resources: { }
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
#  limits:
#    cpu: 100m
#    memory: 128Mi
#  requests:
#    cpu: 100m
#    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: [ ]
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: [ ]
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

envFrom:
  - secretRef:
      name: ihatemoney-secrets
  - configMapRef:
      name: ihatemoney-configmap

nodeSelector: { }

tolerations: [ ]

affinity: { }

postgresql:
  auth:
    username: ihatemoney
    database: ihatemoney
    existingSecret: ihatemoney-secrets
    secretKeys:
      adminPasswordKey: POSTGRESQL_PASSWORD
      replicationPasswordKey: POSTGRESQL_PASSWORD
      userPasswordKey: POSTGRESQL_PASSWORD
  volumePermissions:
    enabled: true
  primary:
    persistence:
      enabled: true
      annotations:
        argocd.argoproj.io/sync-options: Delete=false,Prune=false
    livenessProbe:
      enabled: false
    readinessProbe:
      enabled: false
