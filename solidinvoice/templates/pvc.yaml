apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: '{{ include "solidinvoice.fullname" . }}-data'
  labels:
    {{ include "solidinvoice.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
