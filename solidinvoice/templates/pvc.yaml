apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: '{{ include "solidinvoice.fullname" . }}-data'
  labels:
    {{ include "solidinvoice.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Delete=false,Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
